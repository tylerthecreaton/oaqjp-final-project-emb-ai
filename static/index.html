<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Emotion Detector</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        margin: 2rem auto;
        max-width: 900px;
        line-height: 1.4;
      }
      textarea {
        width: 100%;
        min-height: 140px;
        margin-bottom: 1rem;
      }
      button {
        padding: 0.5rem 1rem;
        cursor: pointer;
      }
      #result {
        margin-top: 1rem;
        padding: 0.75rem;
        border: 1px solid #ddd;
      }
    </style>
  </head>
  <body>
    <h1>Emotion Detector</h1>
    <label for="textToAnalyze">Enter text to analyze:</label>
    <textarea id="textToAnalyze"></textarea>
    <br />
    <button type="button" onclick="runEmotionDetector()">
      Analyze Emotion
    </button>
    <div id="result"></div>

    <script>
      async function runEmotionDetector() {
        const text = document.getElementById("textToAnalyze").value;
        const response = await fetch(
          `/emotionDetector?textToAnalyze=${encodeURIComponent(text)}`,
        );
        const result = await response.text();
        document.getElementById("result").textContent = result;
      }
    </script>
  </body>
</html>
